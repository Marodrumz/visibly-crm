openapi: 3.1.0
info:
  title: Internal CRM, Automation and Local AI Private API
  version: 2.1.0-audited-build-contract
  summary: Production same-origin API contract for the Truehost-hosted internal CRM.
  description: Private implementation contract, not a public developer API. Staff and portal clients use secure server-side sessions. Unsafe same-origin
    methods require CSRF. Mutable resources use ETag/If-Match. Commands that can duplicate effects require Idempotency-Key. Errors use RFC 9457
    application/problem+json. Endpoint-specific performance/query/index budgets are expressed through x-performance, x-query-plan and x-required-indexes.
    This audited revision uses operation-specific request/response examples, applicable error sets, semantic command outcomes and binary download
    contracts.
servers:
- url: /api/v1
  description: Same-origin production API
tags:
- name: Administration
- name: Authentication
- name: Automation
- name: Configuration
- name: Customers
- name: Feedback
- name: Governance
- name: Intelligence
- name: Messaging
- name: Onboarding
- name: Operations
- name: Portal
- name: Public
- name: Reporting
- name: Sales
- name: Success
- name: Support
- name: Work
