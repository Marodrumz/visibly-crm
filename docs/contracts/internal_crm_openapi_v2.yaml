        max_page_size: 0
      x-query-plan: SELECT the authorized release by public_id with actor scope in the same query; join current owner/state only; prefetch bounded
        child collections requested by include; return 404 before unrestricted data is materialized.
      x-required-indexes:
      - UNIQUE(public_id)
      x-success-criteria: Authorized request meets p95 ≤1200 ms and p99 ≤2800 ms on the representative mixed workload, uses ≤25 SQL statements,
        respects the request/response/page bounds, and preserves authorization before loading data. The stated domain transition/result is persisted
        with audit and correlation evidence; negative, stale, duplicate-event and resource-degradation cases fail safely without record/count
        leakage or uncontrolled customer effect.
      security:
      - staffSession: []
      x-cache-policy: private, no-store
      x-required-headers:
      - 'Accept: application/json'
      - 'X-Correlation-ID: <ULID>'
      - 'Cookie: sessionid=<opaque>'
      x-example-query-string: ?fields[release]=id,state,owner_id,updated_at&include=owner
      x-expected-errors:
      - 400 malformed
      - 401 unauthenticated
      - 403 forbidden
      - 404 not visible/not found
      - 429 rate limit/resource guard
      - 503 dependency/resource degraded
components:
  securitySchemes:
    staffSession:
      type: apiKey
      in: cookie
      name: sessionid
    portalSession:
      type: apiKey
      in: cookie
      name: portal_session
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 64
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        example: '"v7"'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
    PageAfter:
      name: page[after]
      in: query
      required: false
      schema:
        type: string
    PageSize:
      name: page[size]
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        maxLength: 100
    FilterState:
      name: filter[state]
      in: query
      required: false
      schema:
        type: string
        maxLength: 40
    Fields:
      name: fields
      in: query
      required: false
      schema:
        type: string
        maxLength: 300
    Include:
      name: include
      in: query
      required: false
      schema:
        type: string
        maxLength: 200
  headers:
    CorrelationId:
      description: Request correlation identifier
      schema:
        type: string
    ETag:
      description: Optimistic resource version
      schema:
        type: string
        example: '"v7"'
    Location:
      description: URI of created resource or queued job
      schema:
        type: string
  schemas:
    Resource:
      type: object
      required:
      - type
      - id
      - attributes
      properties:
        type:
          type: string
        id:
          type: string
        version:
          type: integer
        attributes:
          type: object
          additionalProperties: true
        relationships:
          type: object
          additionalProperties: true
    SingleDocument:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          $ref: '#/components/schemas/Resource'
        meta:
          $ref: '#/components/schemas/Meta'
    CollectionDocument:
      type: object
      required:
      - data
      - links
      - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        links:
          type: object
          properties:
            self:
              type: string
            next:
              type:
              - string
              - 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    Meta:
      type: object
      properties:
        request_id:
          type: string
        correlation_id:
          type: string
        page_size:
          type: integer
        has_more:
          type: boolean
        domain_event_ids:
          type: array
          items:
            type: string
    JobDocument:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          type: object
          properties:
            type:
              const: job
            id:
              type: string
            attributes:
              type: object
              properties:
                state:
                  type: string
                submitted_at:
                  type: string
                  format: date-time
                status_url:
                  type: string
        meta:
          $ref: '#/components/schemas/Meta'
    Problem:
      type: object
      required:
      - type
      - title
      - status
      - detail
      - instance
      - correlation_id
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        correlation_id:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              pointer:
                type: string
              code:
                type: string
              message:
                type: string
  responses:
    Problem400:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem401:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem403:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem404:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem409:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem412:
      description: Precondition Failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem413:
      description: Content Too Large
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem422:
      description: Unprocessable Content
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem429:
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Problem503:
      description: Service Unavailable
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
