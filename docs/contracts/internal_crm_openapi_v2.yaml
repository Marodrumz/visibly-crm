      x-build-step: S07
      x-performance:
        p95_ms: 1500
        p99_ms: 3200
        max_db_queries: 18
        max_request_kb: 16
        max_response_kb: 512
        max_page_size: 100
      x-query-plan: SELECT allowlisted list columns FROM staff_invitations WHERE actor_scope_predicate AND active_predicate AND (updated_at, public_id)
        < (?, ?) ORDER BY updated_at DESC, public_id DESC LIMIT 26; batch-load only requested allowlisted relationships.
