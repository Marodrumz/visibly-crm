            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        type:
                          type: string
                        id:
                          type: string
                        version:
                          type: integer
                        attributes:
                          type: object
                          additionalProperties: false
                          properties:
                            state:
                              type: string
                            name:
                              type: string
                          required:
                          - state
                          - name
                      required:
                      - type
                      - id
                      - version
                      - attributes
                  links:
                    type: object
                    additionalProperties: false
                    properties:
                      self:
                        type: string
                      next:
                        type: string
                    required:
                    - self
                    - next
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      request_id:
                        type: string
                        pattern: ^[0-9A-HJKMNP-TV-Z]{26}$
                      correlation_id:
                        type: string
                      page_size:
                        type: integer
                      has_more:
                        type: boolean
                    required:
                    - request_id
                    - correlation_id
                    - page_size
                    - has_more
                required:
                - data
                - links
                - meta
              example:
                data:
                - type: staff-invitation
                  id: 01K2STAFFINV00000000000000
                  version: 7
                  attributes:
                    state: ACTIVE
                    name: Staff Invitation
                links:
                  self: /api/v1/staff-invitations?page[after]=01K2CURSOR0000000000000000&page[size]=25&sort=-updated_at
                  next: /api/v1/staff-invitations?page[after]=01K2NEXT00000000000000000&page[size]=25
                meta:
                  request_id: 01K2REQ0000000000000000001
                  correlation_id: 01K2CORR00000000000000001
                  page_size: 25
                  has_more: true
        '400':
          $ref: '#/components/responses/Problem400'
        '401':
          $ref: '#/components/responses/Problem401'
        '403':
          $ref: '#/components/responses/Problem403'
        '404':
